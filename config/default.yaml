# PRSYS TI-GATE – Kalibratie-configuratie
# Gebaseerd op TRST Architectuur / TDS Kalibratie-Appendix
#
# Gebruik: prsys transfer --input metrics.json --config config/default.yaml

transfer_guard:
  # Minimale Transfer Integrity-score (Axioma A10).
  # Bronnen met TI < ti_min worden direct geblokkeerd.
  # Bereik: 0.05 .. 1.0
  ti_min: 0.80

  # Bovengrens netto voortstuwingsratio phi = tau / (sigma_ext + sigma_int).
  # Als phi >= phi_crit → THROTTLE_HARD (overvectoring-risico).
  phi_crit: 5.0

  # Minimale progressiedrempel |gradB| ≤ delta → NO_OP (Daedalus-stasis).
  # Kleine waarden: overdracht is zinloos (te weinig waarde).
  delta: 0.05

  # Drukvermenigvuldiger voor THROTTLE_OR_SPLIT_STEP.
  # Als |gradB| >= c * phi → stap opsplitsen of vertragen.
  c: 2.0

  # Kleine buffer voor randgevallen (veilige deling door nul).
  eps: 0.10

audit:
  # Pad naar het append-only JSONL-logbestand (Axioma A7).
  path: "prsys_audit.jsonl"
  # Zet op false om audit-logging te onderdrukken (niet aanbevolen).
  enabled: true
